<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Downloader — Liquid Glass</title>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#1a0533">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="YT Downloader">
<meta name="mobile-web-app-capable" content="yes">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #6366f1;
  --primary-light: #818cf8;
  --accent: #a855f7;
  --accent-light: #c084fc;
  --success: #22c55e;
  --error: #ef4444;
  --warning: #f59e0b;
  --glass-bg: rgba(255, 255, 255, 0.06);
  --glass-border: rgba(255, 255, 255, 0.12);
  --glass-hover: rgba(255, 255, 255, 0.1);
  --text: #f1f5f9;
  --text-dim: #94a3b8;
  --radius: 20px;
  --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
  background: linear-gradient(135deg, #1a0533 0%, #0c1445 50%, #1e1b4b 100%);
  min-height: 100vh;
  color: var(--text);
  overflow-x: hidden;
  position: relative;
}

/* Login Screen */
.login-screen {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #1a0533 0%, #0c1445 50%, #1e1b4b 100%);
  transition: opacity 0.5s ease, visibility 0.5s ease;
}
.login-screen.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
.login-card {
  width: 380px;
  padding: 40px 32px;
  background: var(--glass-bg);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
  text-align: center;
}
.login-card h2 {
  font-size: 1.5rem;
  font-weight: 700;
  background: linear-gradient(135deg, #fff, var(--primary-light), var(--accent-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.login-card .subtitle {
  color: var(--text-dim);
  font-size: 0.9rem;
  margin-bottom: 28px;
}
.login-field {
  width: 100%;
  padding: 14px 18px;
  border-radius: 12px;
  border: 1px solid var(--glass-border);
  background: rgba(0, 0, 0, 0.3);
  color: var(--text);
  font-size: 1rem;
  outline: none;
  margin-bottom: 14px;
  transition: all 0.3s ease;
}
.login-field:focus {
  border-color: var(--primary);
  box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
}
.login-field::placeholder { color: var(--text-dim); }
.login-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: white;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.3s ease;
  box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
}
.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(99, 102, 241, 0.5);
}
.login-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}
.login-error {
  color: var(--error);
  font-size: 0.85rem;
  margin-top: 12px;
  min-height: 20px;
}

/* Animated gradient orbs */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.4;
  animation: float 20s ease-in-out infinite;
  pointer-events: none;
  z-index: 0;
}
.orb-1 {
  width: 400px; height: 400px;
  background: radial-gradient(circle, var(--primary), transparent 70%);
  top: -100px; left: -100px;
  animation-delay: 0s;
}
.orb-2 {
  width: 350px; height: 350px;
  background: radial-gradient(circle, var(--accent), transparent 70%);
  bottom: -80px; right: -80px;
  animation-delay: -7s;
  animation-duration: 25s;
}
.orb-3 {
  width: 250px; height: 250px;
  background: radial-gradient(circle, #06b6d4, transparent 70%);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  animation-delay: -14s;
  animation-duration: 30s;
}

@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(50px, -30px) scale(1.1); }
  50% { transform: translate(-30px, 50px) scale(0.9); }
  75% { transform: translate(30px, 30px) scale(1.05); }
}

@keyframes shimmer {
  0% { background-position: -200% center; }
  100% { background-position: 200% center; }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* Container */
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 40px 20px;
  position: relative;
  z-index: 1;
}

/* Header */
header {
  text-align: center;
  padding: 40px 20px 20px;
  position: relative;
}
.header-actions {
  position: absolute;
  top: 20px;
  right: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.queue-status {
  font-size: 0.85rem;
  color: var(--text-dim);
  background: var(--glass-bg);
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid var(--glass-border);
}
.queue-status .cd2-temp {
  color: var(--warning);
  font-weight: 600;
}
header h1 {
  font-size: 2.5rem;
  font-weight: 700;
  background: linear-gradient(135deg, #fff, var(--primary-light), var(--accent-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
header p {
  color: var(--text-dim);
  font-size: 1rem;
}

/* Glass Card */
.glass {
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 24px;
  margin-bottom: 24px;
  transition: all 0.3s ease;
}
.glass:hover {
  background: var(--glass-hover);
  border-color: rgba(255, 255, 255, 0.2);
}

/* Input Section */
.input-section { display: flex; flex-direction: column; gap: 16px; }
.input-row { display: flex; gap: 12px; }
.input-row input[type="text"] {
  flex: 1;
  padding: 14px 20px;
  border-radius: 14px;
  border: 1px solid var(--glass-border);
  background: rgba(0, 0, 0, 0.3);
  color: var(--text);
  font-size: 1rem;
  outline: none;
  transition: all 0.3s ease;
}
.input-row input[type="text"]:focus {
  border-color: var(--primary);
  box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
}
.input-row input[type="text"]::placeholder { color: var(--text-dim); }

/* Format Toggle */
.format-toggle {
  display: flex;
  background: rgba(0, 0, 0, 0.3);
  border-radius: 12px;
  padding: 4px;
  border: 1px solid var(--glass-border);
}
.format-btn {
  flex: 1;
  padding: 10px 16px;
  border: none;
  border-radius: 10px;
  background: transparent;
  color: var(--text-dim);
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s ease;
}
.format-btn.active {
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: white;
  box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
}
.format-btn:hover:not(.active) { color: var(--text); }

/* Quality Select */
.quality-select {
  padding: 12px 16px;
  border-radius: 12px;
  border: 1px solid var(--glass-border);
  background: rgba(0, 0, 0, 0.3);
  color: var(--text);
  font-size: 0.9rem;
  outline: none;
  cursor: pointer;
}
.quality-select option { background: #1e1b4b; }

/* Buttons */
.btn {
  padding: 14px 28px;
  border: none;
  border-radius: 14px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  justify-content: center;
}
.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: white;
  box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(99, 102, 241, 0.5);
}
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}
.btn-sm {
  padding: 8px 16px;
  font-size: 0.85rem;
  border-radius: 10px;
}
.btn-success {
  background: linear-gradient(135deg, #059669, var(--success));
  color: white;
}
.btn-danger {
  background: rgba(239, 68, 68, 0.2);
  color: var(--error);
  border: 1px solid rgba(239, 68, 68, 0.3);
}
.btn-danger:hover { background: rgba(239, 68, 68, 0.3); }
.btn-outline {
  background: transparent;
  border: 1px solid var(--glass-border);
  color: var(--text-dim);
}
.btn-outline:hover {
  background: var(--glass-bg);
  color: var(--text);
}

/* Progress */
.progress-container { margin: 16px 0; }
.progress-bar {
  height: 8px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 8px;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--accent), var(--primary-light));
  background-size: 200% 100%;
  border-radius: 10px;
  transition: width 0.5s ease;
  animation: shimmer 2s linear infinite;
  box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
}
.progress-info {
  display: flex;
  justify-content: space-between;
  font-size: 0.85rem;
  color: var(--text-dim);
}

/* Task List */
.task-item {
  padding: 16px;
  border-radius: 14px;
  background: rgba(0, 0, 0, 0.2);
  border: 1px solid rgba(255, 255, 255, 0.06);
  margin-bottom: 12px;
  transition: all 0.3s ease;
}
.task-item:hover {
  background: rgba(0, 0, 0, 0.3);
}
.task-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.task-title {
  font-weight: 600;
  font-size: 0.95rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 70%;
}
.status-badge {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.status-badge.queued { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
.status-badge.downloading { background: rgba(99, 102, 241, 0.2); color: var(--primary-light); }
.status-badge.done { background: rgba(34, 197, 94, 0.2); color: var(--success); }
.status-badge.error { background: rgba(239, 68, 68, 0.2); color: var(--error); }
.status-badge.moving { background: rgba(168, 85, 247, 0.2); color: var(--accent-light); animation: pulse 1.5s infinite; }
.status-badge.moved { background: rgba(34, 197, 94, 0.3); color: var(--success); }

.task-url {
  font-size: 0.8rem;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 12px;
}
.task-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

/* Files Section */
.file-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px;
  border-radius: 14px;
  background: rgba(0, 0, 0, 0.2);
  border: 1px solid rgba(255, 255, 255, 0.06);
  margin-bottom: 12px;
  transition: all 0.3s ease;
}
.file-item:hover { background: rgba(0, 0, 0, 0.3); }
.file-thumb {
  width: 80px;
  height: 60px;
  border-radius: 10px;
  object-fit: cover;
  flex-shrink: 0;
  background: rgba(255, 255, 255, 0.05);
}
.file-info { flex: 1; min-width: 0; }
.file-title {
  font-weight: 600;
  font-size: 0.9rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.file-meta {
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-top: 4px;
  display: flex;
  gap: 12px;
}
.file-actions {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

/* Cookie Upload */
.cookie-area {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  border-radius: 12px;
  border: 2px dashed var(--glass-border);
  background: rgba(0, 0, 0, 0.15);
  cursor: pointer;
  transition: all 0.3s ease;
}
.cookie-area:hover {
  border-color: var(--primary);
  background: rgba(99, 102, 241, 0.1);
}
.cookie-area input[type="file"] { display: none; }
.cookie-status {
  font-size: 0.85rem;
  color: var(--text-dim);
}
.cookie-status.active { color: var(--success); }

/* Section Headers */
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.section-header h2 {
  font-size: 1.2rem;
  font-weight: 600;
}
.section-header .count {
  background: rgba(255, 255, 255, 0.1);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.8rem;
  color: var(--text-dim);
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-dim);
}
.empty-state svg {
  width: 48px;
  height: 48px;
  margin-bottom: 12px;
  opacity: 0.3;
}

/* Loading Spinner */
.spinner {
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255, 255, 255, 0.2);
  border-top-color: var(--primary-light);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast Notifications */
.toast-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  padding: 14px 20px;
  border-radius: 12px;
  background: var(--glass-bg);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  box-shadow: var(--shadow);
  font-size: 0.9rem;
  animation: slideIn 0.3s ease;
  max-width: 350px;
}
.toast.success { border-left: 4px solid var(--success); }
.toast.error { border-left: 4px solid var(--error); }
.toast.info { border-left: 4px solid var(--primary); }

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* Responsive */
@media (max-width: 640px) {
  .container { padding: 20px 12px; }
  header h1 { font-size: 1.8rem; }
  .input-row { flex-direction: column; }
  .file-item { flex-direction: column; align-items: flex-start; }
  .file-thumb { width: 100%; height: 120px; }
  .file-actions { width: 100%; }
  .file-actions .btn { flex: 1; }
  .task-actions { flex-direction: column; align-items: stretch; }
}

/* Tabs */
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 24px;
  background: rgba(0, 0, 0, 0.2);
  border-radius: 14px;
  padding: 4px;
  border: 1px solid var(--glass-border);
}
.tab {
  flex: 0 1 auto;
  padding: 10px 18px;
  border: none;
  border-radius: 12px;
  background: transparent;
  color: var(--text-dim);
  font-size: 0.95rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s ease;
  white-space: nowrap;
  min-width: fit-content;
}
.tab.active {
  background: rgba(255, 255, 255, 0.1);
  color: var(--text);
}
.tab:hover:not(.active) { color: var(--text); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Glow effect for active downloads */
.glow-active {
  box-shadow: 0 0 20px rgba(99, 102, 241, 0.2), var(--shadow);
}

/* Current video in playlist */
.current-video {
  animation: currentVideoPulse 2s ease-in-out infinite;
}
@keyframes currentVideoPulse {
  0%, 100% { border-left-color: var(--primary); }
  50% { border-left-color: var(--accent); }
}

/* Thumbnail Toggle */
.thumbnail-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: 20px;
  background: rgba(0, 0, 0, 0.2);
  border: 1px solid var(--glass-border);
  color: var(--text-dim);
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.3s ease;
  user-select: none;
}
.thumbnail-toggle:hover {
  background: var(--glass-bg);
  color: var(--text);
}
.thumbnail-toggle.active {
  background: rgba(99, 102, 241, 0.2);
  border-color: var(--primary);
  color: var(--primary-light);
}

/* Search / Filter bar */
.filter-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-search {
  flex: 1;
  min-width: 160px;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  padding: 8px 14px;
  color: var(--text);
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
}
.filter-search:focus {
  border-color: var(--primary);
}
.filter-search::placeholder {
  color: var(--text-dim);
}
.filter-select {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  padding: 8px 12px;
  color: var(--text);
  font-size: 0.85rem;
  outline: none;
  cursor: pointer;
  min-width: 110px;
}
.filter-select option {
  background: #1a1a2e;
  color: var(--text);
}
.filter-count {
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-left: auto;
}

/* Batch Action Bar */
.batch-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  background: rgba(15, 10, 40, 0.95);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--glass-border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.batch-count {
  font-size: 0.95rem;
  color: var(--text);
  font-weight: 600;
}
.batch-actions {
  display: flex;
  align-items: center;
  gap: 8px;
}
.batch-move-btns {
  display: flex;
  gap: 6px;
}

/* Task checkbox */
.task-checkbox {
  width: 20px;
  height: 20px;
  border-radius: 5px;
  border: 2px solid var(--glass-border);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
  margin-right: 10px;
  margin-top: 4px;
}
.task-checkbox:hover {
  border-color: var(--primary);
}
.task-checkbox.selected {
  background: var(--primary);
  border-color: var(--primary);
}
.task-checkbox.selected::after {
  content: '✓';
  color: white;
  font-size: 12px;
  font-weight: bold;
}
.task-item-with-thumb {
  display: flex;
  gap: 12px;
  align-items: flex-start;
}
.task-thumb {
  width: 120px;
  height: 68px;
  border-radius: 10px;
  object-fit: cover;
  flex-shrink: 0;
  background: rgba(255, 255, 255, 0.05);
  cursor: pointer;
  transition: all 0.3s ease;
}
.task-thumb:hover {
  transform: scale(1.05);
  box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
}
.task-thumb.hidden { display: none; }
.task-content { flex: 1; min-width: 0; }

/* Enhanced file thumb */
.file-thumb {
  width: 120px;
  height: 68px;
  border-radius: 10px;
  object-fit: cover;
  flex-shrink: 0;
  background: rgba(255, 255, 255, 0.05);
  cursor: pointer;
  transition: all 0.3s ease;
}
.file-thumb:hover {
  transform: scale(1.05);
  box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
}
.file-thumb.hidden { display: none; }

/* Modal / Lightbox */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 9998;
  background: rgba(0, 0, 0, 0.85);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;
}
.modal-overlay.active {
  opacity: 1;
  visibility: visible;
}
.modal-content {
  max-width: 90vw;
  max-height: 90vh;
  position: relative;
}
.modal-img {
  max-width: 100%;
  max-height: 85vh;
  border-radius: 16px;
  box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
  object-fit: contain;
}
.modal-close {
  position: absolute;
  top: -40px;
  right: 0;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  color: var(--text);
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
}
.modal-close:hover {
  background: rgba(239, 68, 68, 0.3);
  border-color: var(--error);
}

/* Path Manager */
.path-manager-btn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border: none;
  color: white;
  font-size: 24px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
  transition: all 0.3s ease;
  z-index: 100;
}
.path-manager-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 8px 30px rgba(99, 102, 241, 0.6);
}
.path-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10000;
}
.path-modal.hidden { display: none; }
.path-modal-content {
  width: 500px;
  max-width: 90vw;
  max-height: 80vh;
  background: var(--glass-bg);
  backdrop-filter: blur(30px);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 32px;
  overflow-y: auto;
}
.path-modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}
.path-modal-header h3 {
  font-size: 1.3rem;
  background: linear-gradient(135deg, #fff, var(--primary-light));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.path-close-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid var(--glass-border);
  background: transparent;
  color: var(--text);
  cursor: pointer;
  font-size: 18px;
}
.path-list { margin-bottom: 20px; }

/* Concurrency Settings */
.setting-group {
  margin-bottom: 20px;
}
.setting-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.setting-label span:first-child {
  font-weight: 600;
  color: var(--text);
}
.setting-hint {
  font-size: 0.8rem;
  color: var(--text-dim);
}
.setting-input {
  width: 100%;
  padding: 12px 16px;
  border-radius: 12px;
  border: 1px solid var(--glass-border);
  background: rgba(0, 0, 0, 0.3);
  color: var(--text);
  font-size: 1rem;
  outline: none;
  transition: all 0.3s ease;
}
.setting-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
}
.setting-actions {
  display: flex;
  justify-content: flex-end;
  gap: 12px;
  margin-top: 24px;
}

.path-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: rgba(0,0,0,0.2);
  border-radius: 12px;
  margin-bottom: 8px;
}
.path-item-icon { font-size: 24px; }
.path-item-info { flex: 1; }
.path-item-name { font-weight: 600; font-size: 0.95rem; }
.path-item-path { font-size: 0.8rem; color: var(--text-dim); word-break: break-all; }
.path-delete-btn {
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid rgba(239, 68, 68, 0.3);
  background: rgba(239, 68, 68, 0.1);
  color: var(--error);
  cursor: pointer;
  font-size: 0.8rem;
}
.path-delete-btn:hover { background: rgba(239, 68, 68, 0.2); }
.path-item-actions {
  display: flex;
  gap: 12px;
  align-items: center;
}
.toggle-switch {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  user-select: none;
}
.toggle-switch input {
  display: none;
}
.toggle-slider {
  position: relative;
  width: 40px;
  height: 22px;
  background: rgba(255,255,255,0.1);
  border-radius: 11px;
  transition: all 0.3s ease;
  border: 1px solid rgba(255,255,255,0.15);
}
.toggle-slider::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 16px;
  height: 16px;
  background: rgba(255,255,255,0.5);
  border-radius: 50%;
  transition: all 0.3s ease;
}
.toggle-switch input:checked + .toggle-slider {
  background: var(--primary);
  border-color: var(--primary);
  box-shadow: 0 0 12px rgba(99, 102, 241, 0.4);
}
.toggle-switch input:checked + .toggle-slider::after {
  transform: translateX(18px);
  background: #fff;
}
.toggle-label {
  font-size: 0.8rem;
  color: var(--text-dim);
}
.toggle-switch input:checked ~ .toggle-label {
  color: var(--primary);
}
.path-add-form {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding-top: 16px;
  border-top: 1px solid var(--glass-border);
}
.path-add-form h4 {
  font-size: 1rem;
  color: var(--text-dim);
}
.path-input-row {
  display: flex;
  gap: 8px;
}
.path-input-row input {
  flex: 1;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid var(--glass-border);
  background: rgba(0,0,0,0.3);
  color: var(--text);
  font-size: 0.9rem;
}
.path-input-row input::placeholder { color: var(--text-dim); }

</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="toast-container" id="toasts"></div>

<!-- Login Screen -->

  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Tabs -->

    <div style="display: flex; gap: 4px;">

      <button class="tab" onclick="switchTab('playlists', this)">📁 播放列表</button>

<script>
let selectedFormat = 'best';
const API = '';
const TASKS = {};
const WS_CONNECTIONS = {};
let MOVE_PATHS = [];
let authToken = localStorage.getItem('yt_dl_token') || '';
let showThumbnails = localStorage.getItem('yt_dl_thumbnails') === 'true';

// Search / Filter state
let filterTaskQ = '';
let filterTaskStatus = '';
let filterFileQ = '';
let filterTimeout = null;

// Batch selection state
const SELECTED_TASKS = new Set();

// Playlist tab state
let PLAYLISTS = {};
const SELECTED_PLAYLISTS = new Set();
let filterPlaylistQ = '';

// Subscription tab state
const SELECTED_SUBS = new Set();
let filterSubQ = '';

function onTaskFilterChange() {
  clearTimeout(filterTimeout);
  // Show/hide clear button
  const clearBtn = document.getElementById('taskSearchClear');
  if (clearBtn) {
    clearBtn.style.display = document.getElementById('taskSearchInput').value.trim() ? 'inline' : 'none';
  }
  filterTimeout = setTimeout(() => {
    filterTaskQ = document.getElementById('taskSearchInput').value.trim();
    filterTaskStatus = document.getElementById('taskStatusFilter').value;
    loadTasks();
  }, 300); // debounce 300ms
}

function clearTaskSearch() {
  document.getElementById('taskSearchInput').value = '';
  document.getElementById('taskStatusFilter').value = '';
  filterTaskQ = '';
  filterTaskStatus = '';
  document.getElementById('taskSearchClear').style.display = 'none';
  loadTasks();
}

// Batch selection
function toggleTaskSelect(taskId) {
  if (SELECTED_TASKS.has(taskId)) {
    SELECTED_TASKS.delete(taskId);
  } else {
    SELECTED_TASKS.add(taskId);
  }
  updateBatchBar();
  updateCheckboxUI(taskId);
}

function toggleSelectAll() {
  const allItems = document.querySelectorAll('.task-item[data-task-id]');
  const allIds = Array.from(allItems).map(el => el.dataset.taskId);
  const allSelected = allIds.every(id => SELECTED_TASKS.has(id));

  if (allSelected) {
    allIds.forEach(id => SELECTED_TASKS.delete(id));
  } else {
    allIds.forEach(id => SELECTED_TASKS.add(id));
  }
  updateBatchBar();
  allItems.forEach(el => updateCheckboxUI(el.dataset.taskId));
}

function updateCheckboxUI(taskId) {
  const item = document.querySelector(`.task-item[data-task-id="${taskId}"]`);
  if (!item) return;
  const cb = item.querySelector('.task-checkbox');
  if (!cb) return;
  const isSelected = SELECTED_TASKS.has(taskId);
  cb.className = `task-checkbox ${isSelected ? 'selected' : ''}`;
}

function updateBatchBar() {
  const bar = document.getElementById('batchBar');
  const countEl = document.getElementById('batchCount');
  const selectAllBtn = document.getElementById('selectAllBtn');
  const moveBtns = document.getElementById('batchMoveBtns');

  const count = SELECTED_TASKS.size;
  if (count === 0) {
    bar.style.display = 'none';
    selectAllBtn.style.display = 'none';
    document.body.style.paddingBottom = '0';
    return;
  }

  bar.style.display = 'flex';
  selectAllBtn.style.display = 'inline-block';
  countEl.textContent = `已选 ${count} 项 (点击取消)`;
  countEl.style.cursor = 'pointer';
  countEl.onclick = () => { SELECTED_TASKS.clear(); updateBatchBar(); loadTasks(); };
  document.body.style.paddingBottom = '60px';

  // Show move buttons for tasks with status 'done'
  const doneIds = Array.from(SELECTED_TASKS).filter(id => {
    const t = TASKS[id];
    return t && (t.status === 'done' || t.status === 'moved');
  });

  if (doneIds.length > 0) {
    const paths = Array.isArray(MOVE_PATHS) ? MOVE_PATHS : [];
    moveBtns.innerHTML = paths.map(p => {
      const n = p.name || 'Path';
      const pa = p.path || '';
      const i = p.icon || '📦';
      const safeName = n.replace(/'/g, "\\'");
      return `<button class="btn btn-sm btn-success" onclick="batchMove('${pa}', '${safeName}')">${i} 移到${n}</button>`;
    }).join('');
  } else {
    moveBtns.innerHTML = '';
  }
}

// Batch move
async function batchMove(targetPath, targetName) {
  const ids = Array.from(SELECTED_TASKS).filter(id => {
    const t = TASKS[id];
    return t && (t.status === 'done' || t.status === 'moved');
  });
  if (ids.length === 0) {
    showToast('没有可移动的任务', 'info');
    return;
  }
  showToast(`正在移动 ${ids.length} 个文件到 ${targetName || targetPath}...`, 'info');
  try {
    const res = await authFetch(`${API}/api/tasks/batch-move`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task_ids: ids, target_path: targetPath, target_name: targetName }),
    });
    const data = await res.json();
    SELECTED_TASKS.clear();
    updateBatchBar();
    showToast(`批量移动完成：成功 ${data.success} 个，失败 ${data.failed} 个`, data.failed > 0 ? 'error' : 'success');
    loadTasks();
    loadFiles();
  } catch (e) {
    showToast('批量移动失败: ' + e.message, 'error');
  }
}

// Batch delete
async function batchDelete() {
  const ids = Array.from(SELECTED_TASKS);
  if (ids.length === 0) {
    showToast('请先选择要删除的任务', 'info');
    return;
  }
  if (!confirm(`确定删除 ${ids.length} 个任务？已转存的文件不会被删除。`)) return;
  showToast(`正在删除 ${ids.length} 个任务...`, 'info');
  try {
    const res = await authFetch(`${API}/api/tasks/batch-delete`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task_ids: ids }),
    });
    const data = await res.json();
    ids.forEach(id => delete TASKS[id]);
    SELECTED_TASKS.clear();
    updateBatchBar();
    showToast(`批量删除完成：成功 ${data.success} 个，失败 ${data.failed} 个`, data.failed > 0 ? 'error' : 'success');
    loadTasks();
    loadFiles();
  } catch (e) {
    showToast('批量删除失败: ' + e.message, 'error');
  }
}

  }

    const count = s.last_video_count || 0;
    return `
    <div class="task-item" style="margin-bottom: 8px;">

        <div class="task-header">

          <button class="btn btn-sm btn-danger" onclick="deleteSubscription('${s.id}')">🗑 删除</button>

async function saveSubscription() {
  const url = document.getElementById('subUrlInput').value.trim();
  const name = document.getElementById('subNameInput').value.trim();
  const auto = document.getElementById('subAutoDownload').checked;
  const downloadHistory = document.getElementById('subDownloadHistory').checked;
  if (!url) {
    showToast('请输入频道 URL', 'error');
    return;
  }
  try {
    if (editingSubId) {
      await authFetch(`${API}/api/subscriptions/${editingSubId}/update`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: editingSubId, url, name, auto_download: auto, format: 'best' }),
      });
      showToast('订阅已更新', 'success');
    } else {
      await authFetch(`${API}/api/subscriptions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: '', url, name, auto_download: auto, format: 'best' }),
      });
      showToast('订阅已添加', 'success');
      // If user checked "download all history", trigger it
      if (downloadHistory) {
        // Need to get the ID of the newly created subscription
        const res = await authFetch(`${API}/api/subscriptions`);
        if (res.ok) {
          const subs = await res.json();
          const newSub = subs.find(s => s.url === url);
          if (newSub) {
            await triggerDownloadHistory(newSub.id);
          }
        }
      }
    }
    hideSubscriptionForm();
    loadSubscriptions();
  } catch (e) {
    showToast('保存失败: ' + e.message, 'error');
  }
}

async function doLogin() {

  const errEl = document.getElementById('loginError');

// Auth wrapper for fetch
async function authFetch(url, options = {}) {
  if (!options.headers) options.headers = {};
  options.headers['Authorization'] = `Bearer ${authToken}`;
  const res = await fetch(url, options);
  if (res.status === 401) {
    localStorage.removeItem('yt_dl_token');
    authToken = '';
    document.getElementById('loginScreen').classList.remove('hidden');
    showToast('登录已过期，请重新登录', 'error');
    return null;
  }
  return res;
}

// Format bytes
function formatBytes(bytes) {
  if (!bytes) return '未知';
  const units = ['B', 'KB', 'MB', 'GB'];
  let i = 0;
  while (bytes >= 1024 && i < units.length - 1) { bytes /= 1024; i++; }
  return bytes.toFixed(1) + units[i];
}

// Format duration
function formatDuration(seconds) {
  if (!seconds) return '';
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

// WebSocket connection
function connectWS(taskId) {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${protocol}//${location.host}/ws/${taskId}?token=${encodeURIComponent(authToken)}`;
  const ws = new WebSocket(wsUrl);

  ws.onopen = () => console.log(`WS connected: ${taskId}`);

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    handleWSMessage(data);
  };

  ws.onclose = () => {
    delete WS_CONNECTIONS[taskId];
    // Reconnect after delay if task still active
    setTimeout(() => {
      const task = TASKS[taskId];
      if (task && ['queued', 'downloading', 'moving'].includes(task.status)) {
        connectWS(taskId);
      }
    }, 3000);
  };

  WS_CONNECTIONS[taskId] = ws;
}

function handleWSMessage(data) {
  if (!data.task_id) return;
  const taskId = data.task_id;

  if (data.type === 'progress') {
    updateTaskProgress(taskId, data);
    showActiveProgress(taskId, data);
  } else if (data.type === 'playlist_progress') {
    // Update playlist task progress
    if (TASKS[taskId]) {
      TASKS[taskId] = { ...TASKS[taskId], progress: data.percent || 0 };
      updateTaskUI(taskId);
    }
    showActiveProgress(taskId, data);
  } else if (data.type === 'done') {
    TASKS[taskId] = { ...TASKS[taskId], status: 'done', filename: data.filename };
    updateTaskUI(taskId);
    if (!TASKS[taskId]?.is_playlist) {
      showToast(`下载完成: ${TASKS[taskId]?.title || '文件'}`, 'success');
    }
    loadFiles();
  } else if (data.type === 'error') {
    TASKS[taskId] = { ...TASKS[taskId], status: 'error', error: data.message };
    updateTaskUI(taskId);
    showToast(`下载失败: ${data.message}`, 'error');
  } else if (data.type === 'status') {
    TASKS[taskId] = { ...TASKS[taskId], ...data };
    updateTaskUI(taskId);
  }
}

function showActiveProgress(taskId, data) {
  const container = document.getElementById('progressContainer');
  container.style.display = 'block';
  const pct = Math.min(100, data.percent || 0);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPercent').textContent = pct.toFixed(1) + '%';
  document.getElementById('progressSpeed').textContent = data.speed ? `⚡ ${data.speed}` : '';
  document.getElementById('progressEta').textContent = data.eta ? `⏱ ${data.eta}` : '';
}

// Task list management
function addTaskToList(task) {
  TASKS[task.task_id] = task;
}

function updateTaskProgress(taskId, data) {
  if (TASKS[taskId]) {
    TASKS[taskId].progress = data.percent;
    TASKS[taskId].speed = data.speed;
    TASKS[taskId].eta = data.eta;
    updateTaskUI(taskId);
  }
}

function updateTaskUI(taskId) {
  const task = TASKS[taskId];
  if (!task) return;

  const el = document.querySelector(`[data-task-id="${taskId}"]`);
  if (!el) return;

  const statusBadge = el.querySelector('.status-badge');
  if (statusBadge) {
    statusBadge.className = `status-badge ${task.status}`;
    const statusLabels = {
      queued: '排队中',
      downloading: '下载中',
      done: '已完成',
      error: '失败',
      moving: '移动中',
      moved: '已转存',
    };
    statusBadge.textContent = statusLabels[task.status] || task.status;
  }

  const titleEl = el.querySelector('.task-title');
  if (titleEl && task.title) titleEl.textContent = task.title;

  // Update progress bar if exists
  const progressFill = el.querySelector('.progress-fill');
  if (progressFill && task.progress) {
    progressFill.style.width = Math.min(100, task.progress) + '%';
  }
  const progressPct = el.querySelector('.progress-pct');
  if (progressPct && task.progress) {
    progressPct.textContent = task.progress.toFixed(1) + '%';
  }
  const progressSpeed = el.querySelector('.progress-speed');
  if (progressSpeed && task.speed) {
    progressSpeed.textContent = task.speed;
  }
}


// Load move paths
async function loadMovePaths() {
  try {
    const res = await authFetch(`${API}/api/paths`);
    if (!res) return;  // authFetch returned null (401)
    const data = await res.json();
    if (Array.isArray(data)) {
      MOVE_PATHS = data;
    }
  } catch (e) {
    // Fallback to defaults
    MOVE_PATHS = [
      {id: '115', name: '115网盘', path: '/Movies/CloudDrive/115/youtube', icon: '💾'},
      {id: 'baidu', name: '百度网盘', path: '/Movies/CloudDrive/百度网盘', icon: '📀'}
    ];
  }
}

// Load tasks
async function loadTasks() {
  await loadMovePaths();  // Load paths first
  try {
    const params = new URLSearchParams();
    if (filterTaskQ) params.set('q', filterTaskQ);
    if (filterTaskStatus) params.set('status', filterTaskStatus);
    const url = `${API}/api/tasks${params.toString() ? '?' + params.toString() : ''}`;
    const res = await authFetch(url);
    if (!res) return;
    const data = await res.json();
    renderTasks(data.tasks);
    // Sync local TASKS
    data.tasks.forEach(t => {
      if (!TASKS[t.task_id]) {
        TASKS[t.task_id] = t;
        if (['queued', 'downloading', 'moving'].includes(t.status)) {
          connectWS(t.task_id);
        }
      }
    });
  } catch (e) {
    console.error('Failed to load tasks:', e);
  }
}

function renderTasks(tasks) {
    try {
        if (!Array.isArray(tasks)) tasks = [];
        const container = document.getElementById('taskList');
        const countEl = document.getElementById('taskCount');
        const hasFilter = filterTaskQ || filterTaskStatus;
        if (countEl) {
            countEl.textContent = tasks.length + ' 个任务' + (hasFilter ? ' (筛选结果)' : '');
        }

        if (tasks.length === 0) {
            const hasFilter = filterTaskQ || filterTaskStatus;
            container.innerHTML = `
              <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                ${hasFilter ? '<p>没有匹配的任务，请调整搜索条件</p>' : '<p>还没有下载任务，粘贴链接开始吧</p>'}
              </div>`;
            document.getElementById('selectAllBtn').style.display = 'none';
            return;
        }

        document.getElementById('selectAllBtn').style.display = 'inline-block';

        const html = tasks.map(task => {
            const status = task.status || 'queued';
            const title = task.title || '获取中...';
            const url = task.url || '';
            const thumb = task.thumbnail || '';
            const taskId = task.task_id || '';
            const progress = task.progress || 0;
            const speed = task.speed || '';
            const eta = task.eta || '';
            const error = task.error || '';
            const cloudPath = task.cloud_path || '';
            const isPlaylist = task.is_playlist || false;
            const playlistProgress = task.playlist_progress || {current: 0, total: 0};
            const statusLabels = {queued:'排队中',downloading:'下载中',done:'已完成',error:'失败',moving:'移动中',moved:'已转存'};
            const statusLabel = statusLabels[status] || status;
            const isSelected = SELECTED_TASKS.has(taskId);

            let moveButtons = '';
            const paths = Array.isArray(MOVE_PATHS) ? MOVE_PATHS : [];
            if (status === 'done') {
                moveButtons = paths.map(p => {
                    const n = p.name || 'Path';
                    const pa = p.path || '';
                    const i = p.icon || '📦';
                    const safeName = n.replace(/'/g, "\\'");
                    return `<button class="btn btn-sm btn-success" onclick="moveFile('${taskId}', '${pa}', '${safeName}')">${i} 移动到 ${n}</button>`;
                }).join('');
            } else if (status === 'moved') {
                moveButtons = `<span style="color: var(--success); font-size: 0.85rem;">✓ ${cloudPath}</span>`;
            }

            // Playlist-specific UI
            let playlistUI = '';
            if (isPlaylist) {
                playlistUI = `
                    <div style="margin-top: 8px; padding: 8px; background: rgba(99, 102, 241, 0.05); border-radius: 8px;">
                        <div style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem;">
                            <span>📁 播放列表</span>
                            <span style="color: var(--text-dim);">${playlistProgress.current}/${playlistProgress.total} 个视频</span>
                        </div>
                        ${status === 'downloading' ? `
                            <div class="progress-container" style="margin: 8px 0 0 0;">
                                <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
                                <div class="progress-info">
                                    <span class="progress-pct">${progress.toFixed(1)}%</span>
                                    <span>正在下载第 ${playlistProgress.current + 1} 个视频</span>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                `;
            }

            // View details button for playlists
            const viewDetailsBtn = isPlaylist ? `<button class="btn btn-sm btn-primary" onclick="viewPlaylistDetails('${taskId}')">👁️ 查看详情</button>` : '';

            return `
            <div class="task-item ${status === 'downloading' ? 'glow-active' : ''}" data-task-id="${taskId}">
                <div class="task-checkbox ${isSelected ? 'selected' : ''}" onclick="toggleTaskSelect('${taskId}')"></div>
                <div class="task-item-with-thumb">
                    ${thumb && !isPlaylist ? `<img class="task-thumb ${showThumbnails ? '' : 'hidden'}" src="${thumb}" onclick="openModal('${thumb}')" onerror="this.style.display='none'" alt="" />` : ''}
                    ${isPlaylist ? `<div class="task-thumb ${showThumbnails ? '' : 'hidden'}" style="display: flex; align-items: center; justify-content: center; background: rgba(99, 102, 241, 0.2); font-size: 2rem;">📁</div>` : ''}
                    <div class="task-content">
                        <div class="task-header">
                            <div class="task-title">${title}</div>
                            <span class="status-badge ${status}">${statusLabel}</span>
                        </div>
                        <div class="task-url">${url}</div>
                        ${!isPlaylist && status === 'downloading' ? `
                            <div class="progress-container" style="margin: 8px 0">
                                <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
                                <div class="progress-info">
                                    <span class="progress-pct">${progress.toFixed(1)}%</span>
                                    <span class="progress-speed">${speed}</span>
                                    <span>${eta}</span>
                                </div>
                            </div>
                        ` : ''}
                        ${playlistUI}
                        ${status === 'error' ? `<div style="color: var(--error); font-size: 0.85rem; margin-top: 8px;">⚠ ${error}</div>` : ''}
                        <div class="task-actions" style="margin-top: 8px;">
                            ${viewDetailsBtn}
                            ${moveButtons}
                            ${status === 'error' ? `<button class="btn btn-sm" style="background:rgba(255,165,0,0.15);color:#ffa500;border:1px solid rgba(255,165,0,0.3);" onclick="retryTask('${taskId}')">🔄 重试</button>` : ''}
                            <button class="btn btn-sm btn-danger" onclick="deleteTask('${taskId}')">🗑 删除</button>
                        </div>
                    </div>
                </div>
            </div>`;
        }).join('');
        
        container.innerHTML = html;
    } catch (e) {
        console.error('Render error:', e);
        const container = document.getElementById('taskList');
        if (container) container.innerHTML = `<div style="color: red; padding: 20px;">渲染错误: ${e.message}<br><br>请刷新页面</div>`;
    }
}

// Move file
async function moveFile(taskId, targetPath, targetName) {
  showToast(`正在移动到 ${targetName || targetPath}...`, 'info');

  try {
    const res = await authFetch(`${API}/api/move`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task_id: taskId, target_path: targetPath, target_name: targetName }),
    });
    const data = await res.json();
    if (data.success) {
      showToast(`已移动到 ${data.new_path}`, 'success');
      TASKS[taskId].status = 'moved';
      TASKS[taskId].cloud_path = data.new_path;
      updateTaskUI(taskId);
      loadTasks();
      loadFiles();
    }
  } catch (e) {
    showToast('移动失败: ' + e.message, 'error');
  }
}

// Retry failed task
async function retryTask(taskId) {
  try {
    const res = await authFetch(`${API}/api/tasks/${taskId}/retry`, { method: 'POST' });
    const data = await res.json();
    showToast('🔄 已重新排队', 'success');
    loadTasks();
  } catch (e) {
    showToast('重试失败: ' + e.message, 'error');
  }
}

// Delete task
async function deleteTask(taskId) {
  if (!confirm('确定删除此任务？')) return;
  try {
    await authFetch(`${API}/api/tasks/${taskId}`, { method: 'DELETE' });
    delete TASKS[taskId];
    if (WS_CONNECTIONS[taskId]) { WS_CONNECTIONS[taskId].close(); delete WS_CONNECTIONS[taskId]; }
    showToast('已删除', 'info');
    loadTasks();
    loadFiles();
  } catch (e) {
    showToast('删除失败', 'error');
  }
}

// Playlist details view
let currentPlaylistId = null;
let playlistRefreshInterval = null;

async function viewPlaylistDetails(playlistId) {
  currentPlaylistId = playlistId;
  
  // Switch to playlist details view
  document.getElementById('tasksTab').style.display = 'none';
  document.getElementById('playlistDetailsTab').style.display = 'block';
  
  // Load playlist details
  await loadPlaylistDetails(playlistId);
  
  // Start auto-refresh for active playlists
  if (playlistRefreshInterval) clearInterval(playlistRefreshInterval);
  playlistRefreshInterval = setInterval(async () => {
    const task = TASKS[playlistId];
    if (task && ['queued', 'downloading'].includes(task.status)) {
      await loadPlaylistDetails(playlistId);
    } else {
      clearInterval(playlistRefreshInterval);
    }
  }, 3000);
}

async function loadPlaylistDetails(playlistId) {
  try {
    const res = await authFetch(`${API}/api/playlist/${playlistId}/tasks`);
    if (!res) return;
    const data = await res.json();
    
    // Update header
    document.getElementById('playlistDetailTitle').textContent = data.playlist.title || '播放列表';
    document.getElementById('playlistDetailMeta').textContent = `${data.playlist.url} · ${data.total} 个视频`;
    document.getElementById('playlistChildCount').textContent = `${data.total} 个子任务`;
    
    // Render child tasks
    renderPlaylistChildren(data.children, data.playlist.playlist_progress || {current: 0, total: 0});
  } catch (e) {
    console.error('Failed to load playlist details:', e);
  }
}

function renderPlaylistChildren(children, playlistProgress) {
  const container = document.getElementById('playlistChildList');
  
  if (!children || children.length === 0) {
    container.innerHTML = `<div class="empty-state"><p>暂无子任务</p></div>`;
    return;
  }
  
  const html = children.map((task, index) => {
    const status = task.status || 'queued';
    const title = task.title || `视频 ${index + 1}`;
    const progress = task.progress || 0;
    const speed = task.speed || '';
    const eta = task.eta || '';
    const error = task.error || '';
    const statusLabels = {queued:'排队中',downloading:'下载中',done:'已完成',error:'失败',moving:'移动中',moved:'已转存'};
    const statusLabel = statusLabels[status] || status;
    
    // Check if this is the currently downloading video
    const isCurrentVideo = playlistProgress && playlistProgress.current === index;
    
    return `
      <div class="task-item ${status === 'downloading' ? 'glow-active' : ''} ${isCurrentVideo ? 'current-video' : ''}" 
           style="margin-bottom: 8px; border-left: ${isCurrentVideo ? '3px solid var(--primary)' : '3px solid transparent'};">
        <div class="task-content">
          <div class="task-header">
            <div style="display: flex; align-items: center; gap: 8px;">
              <span style="color: var(--text-dim); min-width: 30px;">#${index + 1}</span>
              <div class="task-title">${title}</div>
              ${isCurrentVideo ? '<span style="font-size: 0.75rem; color: var(--primary);">⬇ 正在下载</span>' : ''}
            </div>
            <span class="status-badge ${status}">${statusLabel}</span>
          </div>
          ${status === 'downloading' ? `
            <div class="progress-container" style="margin: 8px 0">
              <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
              <div class="progress-info">
                <span class="progress-pct">${progress.toFixed(1)}%</span>
                <span class="progress-speed">${speed}</span>
                <span>${eta}</span>
              </div>
            </div>
          ` : ''}
          ${status === 'done' ? `
            <div style="font-size: 0.8rem; color: var(--success); margin-top: 4px;">
              ✓ ${task.filename || '已下载'}
            </div>
          ` : ''}
          ${status === 'error' ? `
            <div style="color: var(--error); font-size: 0.85rem; margin-top: 4px;">⚠ ${error}</div>
          ` : ''}
        </div>
      </div>
    `;
  }).join('');
  
  container.innerHTML = html;
}

function backToTaskList() {
  if (playlistRefreshInterval) clearInterval(playlistRefreshInterval);
  currentPlaylistId = null;
  
  document.getElementById('playlistDetailsTab').style.display = 'none';
  document.getElementById('tasksTab').style.display = 'block';
  
  loadTasks();
}

// Load files
async function loadFiles() {
  try {
    const params = new URLSearchParams();
    if (filterFileQ) params.set('q', filterFileQ);
    const url = `${API}/api/files${params.toString() ? '?' + params.toString() : ''}`;
    const res = await authFetch(url);
    const files = await res.json();
    renderFiles(files);
  } catch (e) {
    console.error('Failed to load files:', e);
  }
}

function renderFiles(files) {
    try {
        if (!Array.isArray(files)) files = [];
        const container = document.getElementById('fileList');
        const countEl = document.getElementById('fileCount');
        if (countEl) countEl.textContent = files.length + ' 个文件';

        if (files.length === 0) {
            container.innerHTML = `
              <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
                <p>还没有已下载的文件</p>
              </div>`;
            return;
        }

        const html = files.map(f => {
            const title = f.title || '';
            const thumb = f.thumbnail || '';
            const taskId = f.task_id || '';
            const cloudPath = f.cloud_path || '';
            
            let actions = '';
            const paths = Array.isArray(MOVE_PATHS) ? MOVE_PATHS : [];
            if (!cloudPath) {
                actions = paths.map(p => {
                    const n = p.name || 'Path';
                    const pa = p.path || '';
                    const i = p.icon || '📦';
                    const safeName = n.replace(/'/g, "\\'");
                    return `<button class="btn btn-sm btn-success" onclick="moveFile('${taskId}', '${pa}', '${safeName}')">${i} ${n}</button>`;
                }).join('');
            } else {
                actions = `<div style="font-size: 0.8rem; color: var(--success); margin-top: 4px;">✓ 已转存: ${cloudPath}</div>`;
            }

            return `
            <div class="file-item">
                <img class="file-thumb ${showThumbnails ? '' : 'hidden'}" src="${thumb}" onclick="openModal('${thumb}')" onerror="this.style.display='none'" alt="" />
                <div class="file-info">
                    <div class="file-title">${title}</div>
                    <div class="file-meta">
                        <span>${formatBytes(f.filesize)}</span>
                        ${f.duration ? `<span>${formatDuration(f.duration)}</span>` : ''}
                        <span>${f.format}</span>
                    </div>
                    ${cloudPath ? `<div style="font-size: 0.8rem; color: var(--success); margin-top: 4px;">✓ 已转存: ${cloudPath}</div>` : ''}
                </div>
                <div class="file-actions">
                    ${!cloudPath ? actions : ''}
                    <button class="btn btn-sm btn-danger" onclick="deleteTask('${taskId}')">🗑</button>
                </div>
            </div>`;
        }).join('');
        
        container.innerHTML = html;
    } catch (e) {
        console.error('Render files error:', e);
        const container = document.getElementById('fileList');
        if (container) container.innerHTML = `<div style="color: red; padding: 20px;">渲染错误: ${e.message}</div>`;
    }
}

// Upload cookies
async function uploadCookies(input) {
  const file = input.files[0];
  if (!file) return;

  const formData = new FormData();
  formData.append('file', file);

  try {
    const res = await authFetch(`${API}/api/cookies`, {
      method: 'POST',
      body: formData,
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById('cookieStatus').textContent = '✓ cookies.txt 已上传';
      document.getElementById('cookieStatus').classList.add('active');
      showToast('Cookies 上传成功', 'success');
    }
  } catch (e) {
    showToast('Cookies 上传失败', 'error');
  }
}

// Path Manager Functions
async function togglePathModal() {
  const modal = document.getElementById('pathModal');
  modal.classList.toggle('hidden');
  if (!modal.classList.contains('hidden')) {
    await loadMovePaths();
    renderPathList();
  }
}

function renderPathList() {
  const container = document.getElementById('pathList');
  if (MOVE_PATHS.length === 0) {
    container.innerHTML = '<div style="color: var(--text-dim); text-align: center; padding: 20px;">暂无路径配置</div>';
    return;
  }
  container.innerHTML = MOVE_PATHS.map(p => `
    <div class="path-item">
      <div class="path-item-icon">${p.icon || '📁'}</div>
      <div class="path-item-info">
        <div class="path-item-name">${p.name}</div>
        <div class="path-item-path">${p.path}</div>
      </div>
      <div class="path-item-actions">
        <label class="toggle-switch" title="${p.auto_move ? '关闭自动转存' : '开启自动转存'}">
          <input type="checkbox" ${p.auto_move ? 'checked' : ''} onchange="toggleAutoMove('${p.id}')">
          <span class="toggle-slider"></span>
          <span class="toggle-label">自动转存</span>
        </label>
        <button class="path-delete-btn" onclick="deletePath('${p.id}')">删除</button>
      </div>
    </div>
  `).join('');
}

async function addPath() {
  const nameInput = document.getElementById('pathName');
  const pathInput = document.getElementById('pathValue');
  const name = nameInput.value.trim();
  const path = pathInput.value.trim();
  
  if (!name || !path) {
    showToast('请填写名称和路径', 'error');
    return;
  }
  
  const id = 'path_' + Date.now();
  const icon = '📁';
  
  try {
    const res = await authFetch(`${API}/api/paths`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, name, path, icon }),
    });
    
    if (res.ok) {
      showToast('路径已添加', 'success');
      nameInput.value = '';
      pathInput.value = '';
      await loadMovePaths();
      renderPathList();
      loadTasks();  // Refresh task buttons
      loadFiles();  // Refresh file buttons
    } else {
      const err = await res.json();
      showToast(err.detail || '添加失败', 'error');
    }
  } catch (e) {
    showToast('添加失败: ' + e.message, 'error');
  }
}

async function deletePath(pathId) {
  if (!confirm('确定删除此路径？')) return;
  
  try {
    const res = await authFetch(`${API}/api/paths/${pathId}`, { method: 'DELETE' });
    if (res.ok) {
      showToast('路径已删除', 'info');
      await loadMovePaths();
      renderPathList();
      loadTasks();
      loadFiles();
    }
  } catch (e) {
    showToast('删除失败', 'error');
  }
}

async function toggleAutoMove(pathId) {
  try {
    const res = await authFetch(`${API}/api/paths/${pathId}/auto-move`, { method: 'POST' });
    if (res.ok) {
      const data = await res.json();
      // Update MOVE_PATHS in place
      MOVE_PATHS.forEach(p => {
        p.auto_move = (p.id === pathId) ? data.auto_move : false;
      });
      // Update all toggle switches visually without re-rendering
      document.querySelectorAll('.path-item').forEach(item => {
        const toggle = item.querySelector('.toggle-switch input');
        if (toggle) {
          const id = toggle.getAttribute('onchange')?.match(/'([^']+)'/)?.[1];
          if (id) {
            const pathData = MOVE_PATHS.find(p => p.id === id);
            toggle.checked = pathData ? pathData.auto_move : false;
          }
        }
      });
      showToast(data.auto_move ? '已开启自动转存' : '已关闭自动转存', data.auto_move ? 'success' : 'info');
    }
  } catch (e) {
    showToast('操作失败', 'error');
  }
}

      <h3 style="margin: 0;">⚙️ 并发设置</h3>
      <button class="modal-close" onclick="closeConcurrencyModal()">×</button>
    </div>
    
    <div class="setting-group">
      <label class="setting-label">
        <span>最大同时任务数</span>
        <span class="setting-hint">下载 + 上传总数</span>
      </label>
      <input type="number" id="maxConcurrent" min="1" max="10" value="3" class="setting-input" />
    </div>
    
    <div class="setting-group">
      <label class="setting-label">
        <span>CloudDrive2 临时目录</span>
        <span class="setting-hint">监控上传状态</span>
      </label>
      <input type="text" id="cd2TempDir" value="/opt/docker/cd2/temp" class="setting-input" />
    </div>
    
    <div class="setting-group">
      <label class="setting-label">
        <span>检查间隔（秒）</span>
        <span class="setting-hint">状态轮询频率</span>
      </label>
      <input type="number" id="checkInterval" min="1" max="60" value="5" class="setting-input" />
    </div>
    
    <div class="setting-actions">
      <button class="btn btn-outline" onclick="closeConcurrencyModal()">取消</button>
      <button class="btn btn-primary" onclick="saveConcurrencyConfig()">保存</button>
    </div>
  </div>
</div>

<script>
// Register Service Worker for PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/static/service-worker.js')
      .then((reg) => console.log('SW registered:', reg.scope))
      .catch((err) => console.log('SW registration failed:', err));
  });
}


// ── Playlist Tab Functions ──────────────────────────────────────────────

async function loadPlaylists() {
  try {
    const params = new URLSearchParams();
    if (filterPlaylistQ) params.set('q', filterPlaylistQ);
    const res = await authFetch(`${API}/api/playlists?${params}`);
    if (!res) return;
    const data = await res.json();
    // Store for rendering
    window._playlistsData = data.playlists;
    renderPlaylists(data.playlists);
  } catch (e) {
    console.error('Failed to load playlists:', e);
  }
}

function renderPlaylists(playlists) {
  const container = document.getElementById('playlistList');
  const countEl = document.getElementById('playlistCount');
  if (!playlists || playlists.length === 0) {
    container.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg><p>还没有播放列表下载任务</p></div>';
    if (countEl) countEl.textContent = '0 个播放列表';
    return;
  }
  if (countEl) countEl.textContent = playlists.length + ' 个播放列表';

  const html = playlists.map(function(pl) {
    var pct = pl.total_count > 0 ? Math.round(pl.completed_count / pl.total_count * 100) : 0;
    var isSelected = SELECTED_PLAYLISTS.has(pl.task_id);
    var statusLabels = {queued: '⏳ 排队中', downloading: '📥 下载中', done: '✅ 已完成', error: '❌ 失败', moving: '🔄 移动中', moved: '📦 已转存', paused: '⏸ 已暂停'};
    var statusLabel = statusLabels[pl.status] || pl.status;
    var borderColor = isSelected ? 'var(--primary)' : 'var(--glass-border)';
    var checkmark = isSelected ? '☑️' : '☐';

    // 根据子任务状态决定转存按钮
    var allChildren = pl.completed_count || 0;
    var allMoved = pl.status === 'moved';
    var canMove = pl.status === 'done';
    var moveButtons = '';
    var paths = Array.isArray(MOVE_PATHS) ? MOVE_PATHS : [];
    if (canMove && paths.length > 0) {
      moveButtons = paths.map(function(p) {
        var n = p.name || 'Path';
        var pa = p.path || '';
        var i = p.icon || '📦';
        var safeName = n.replace(/'/g, "\\'");
        return '<button class="btn btn-sm btn-success pl-action" onclick="event.stopPropagation(); movePlaylist(\'' + pl.task_id + '\', \'' + pa + '\', \'' + safeName + '\')">' + i + ' ' + n + '</button>';
      }).join('');
    } else if (allMoved) {
      moveButtons = '<span style="color: var(--success); font-size: 0.8rem;">✓ 已转存</span>';
    }

    // 暂停/恢复按钮
    var pauseResumeBtn = '';
    if (pl.status === 'downloading' || pl.status === 'queued') {
      pauseResumeBtn = '<button class="btn btn-sm pl-action" style="background: rgba(255,165,0,0.2); color: #ffa500; border: 1px solid rgba(255,165,0,0.3);" onclick="event.stopPropagation(); pausePlaylist(\'' + pl.task_id + '\')">⏸ 暂停</button>';
    } else if (pl.status === 'paused') {
      pauseResumeBtn = '<button class="btn btn-sm pl-action" style="background: rgba(34,197,94,0.2); color: #22c55e; border: 1px solid rgba(34,197,94,0.3);" onclick="event.stopPropagation(); resumePlaylist(\'' + pl.task_id + '\')">▶ 继续</button>';
    }

    return [
      '<div class="playlist-card" data-pl-id="' + pl.task_id + '" style="margin-bottom: 8px; padding: 12px 16px; background: var(--glass-bg); border-radius: 12px; border: 1px solid ' + borderColor + '; cursor: pointer; transition: border-color 0.2s;" onclick="openPlaylistModal(\'' + pl.task_id + '\')">',
      '  <div style="display: flex; align-items: center; gap: 12px;">',
      '    <span class="pl-checkbox ' + (isSelected ? 'selected' : '') + '" onclick="event.stopPropagation(); togglePlaylistSelect(\'' + pl.task_id + '\')" style="cursor: pointer; font-size: 1.1rem; flex-shrink: 0;">' + checkmark + '</span>',
      '    <div style="flex: 1; min-width: 0;">',
      '      <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 4px;">',
      '        <div class="task-title" style="flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">' + escapeHtml(pl.title) + '</div>',
      '        <span class="status-badge ' + pl.status + '">' + statusLabel + '</span>',
      '      </div>',
      '      <div class="task-url" style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">' + escapeHtml(pl.url) + '</div>',
      '      <div style="margin-top: 6px; display: flex; align-items: center; gap: 8px;">',
      '        <div style="flex: 1; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden;">',
      '          <div style="width: ' + pct + '%; height: 100%; background: ' + (pct >= 100 ? 'var(--success)' : 'var(--primary)') + '; border-radius: 3px; transition: width 0.3s;"></div>',
      '        </div>',
      '        <span style="font-size: 0.8rem; color: var(--text-dim); white-space: nowrap;">' + pl.completed_count + '/' + pl.total_count + '</span>',
      '      </div>',
      '    </div>',
      '    <div class="pl-actions" style="display: flex; gap: 4px; flex-shrink: 0; align-items: center;">',
      pauseResumeBtn,
      moveButtons,
      '      <button class="btn btn-sm btn-danger pl-action" onclick="event.stopPropagation(); deletePlaylist(\'' + pl.task_id + '\')">🗑</button>',
      '    </div>',
      '  </div>',
      '</div>'
    ].join('');
  }).join('');
  container.innerHTML = html;
  updatePlaylistBatchBar();
}

function escapeHtml(text) {
  var div = document.createElement('div');
  div.textContent = text || '';
  return div.innerHTML;
}

function togglePlaylistSelect(id) {
  if (SELECTED_PLAYLISTS.has(id)) {
    SELECTED_PLAYLISTS.delete(id);
  } else {
    SELECTED_PLAYLISTS.add(id);
  }
  updatePlaylistBatchBar();
  // Re-render to update checkbox states
  var data = window._playlistsData || [];
  renderPlaylists(data);
}

function toggleSelectAllPlaylists() {
  var data = window._playlistsData || [];
  var allIds = data.map(function(p) { return p.task_id; });
  var allSelected = allIds.every(function(id) { return SELECTED_PLAYLISTS.has(id); });
  if (allSelected) {
    allIds.forEach(function(id) { SELECTED_PLAYLISTS.delete(id); });
  } else {
    allIds.forEach(function(id) { SELECTED_PLAYLISTS.add(id); });
  }
  updatePlaylistBatchBar();
  renderPlaylists(data);
}

function updatePlaylistBatchBar() {
  var bar = document.getElementById('batchBar');
  var countEl = document.getElementById('batchCount');
  var selectAllBtn = document.getElementById('selectAllPlaylistBtn');
  var moveBtns = document.getElementById('batchMoveBtns');
  var count = SELECTED_PLAYLISTS.size;
  if (count === 0) {
    bar.style.display = 'none';
    if (selectAllBtn) selectAllBtn.style.display = 'none';
    document.body.style.paddingBottom = '0';
    return;
  }
  bar.style.display = 'flex';
  if (selectAllBtn) selectAllBtn.style.display = 'inline-block';
  countEl.textContent = '已选 ' + count + ' 个播放列表 (点击取消)';
  countEl.style.cursor = 'pointer';
  countEl.onclick = function() { SELECTED_PLAYLISTS.clear(); updatePlaylistBatchBar(); loadPlaylists(); };
  document.body.style.paddingBottom = '60px';
  var paths = Array.isArray(MOVE_PATHS) ? MOVE_PATHS : [];
  moveBtns.innerHTML = paths.map(function(p) {
    var n = p.name || 'Path';
    var pa = p.path || '';
    var i = p.icon || '📦';
    return '<button class="btn btn-sm btn-success" onclick="batchMovePlaylists(\'' + pa + '\', \'' + n.replace(/'/g, "\\'") + '\')">' + i + ' 移到' + n + '</button>';
  }).join('');
}

async function batchMovePlaylists(targetPath, targetName) {
  var ids = Array.from(SELECTED_PLAYLISTS);
  if (ids.length === 0) return;
  showToast('正在移动 ' + ids.length + ' 个播放列表的文件...', 'info');
  try {
    var res = await authFetch(API + '/api/playlists/batch-move', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task_ids: ids, target_path: targetPath, target_name: targetName }),
    });
    var data = await res.json();
    SELECTED_PLAYLISTS.clear();
    updatePlaylistBatchBar();
    showToast('批量移动完成：成功 ' + data.success + '，失败 ' + data.failed, data.failed > 0 ? 'error' : 'success');
    loadPlaylists();
    loadFiles();
  } catch (e) {
    showToast('批量移动失败: ' + e.message, 'error');
  }
}

async function pausePlaylist(id) {
  try {
    await authFetch(API + '/api/playlist/' + id + '/pause', { method: 'POST' });
    showToast('播放列表已暂停', 'info');
    loadPlaylists();
  } catch (e) {
    showToast('暂停失败: ' + e.message, 'error');
  }
}

async function resumePlaylist(id) {
  try {
    await authFetch(API + '/api/playlist/' + id + '/resume', { method: 'POST' });
    showToast('播放列表已继续', 'success');
    loadPlaylists();
  } catch (e) {
    showToast('继续失败: ' + e.message, 'error');
  }
}

async function deletePlaylist(id) {
  if (!confirm('确定删除此播放列表及其所有子任务？')) return;
  try {
    await authFetch(API + '/api/playlists/batch-delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task_ids: [id] }),
    });
    SELECTED_PLAYLISTS.delete(id);
    updatePlaylistBatchBar();
    showToast('播放列表已删除', 'success');
    loadPlaylists();
    loadTasks();
  } catch (e) {
    showToast('删除失败: ' + e.message, 'error');
  }
}

async function movePlaylist(id, targetPath, targetName) {
  if (!targetPath || !targetName) {
    if (MOVE_PATHS.length === 0) {
      showToast('请先配置转存路径', 'error');
      return;
    }
    var p = MOVE_PATHS[0];
    targetPath = p.path;
    targetName = p.name;
  }
  showToast('正在转存到 ' + targetName + '...', 'info');
  try {
    var res = await authFetch(API + '/api/playlists/batch-move', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task_ids: [id], target_path: targetPath, target_name: targetName }),
    });
    var data = await res.json();
    showToast('转存完成：成功 ' + data.success + '，失败 ' + data.failed, data.failed > 0 ? 'error' : 'success');
    loadPlaylists();
    loadFiles();
  } catch (e) {
    showToast('转存失败: ' + e.message, 'error');
  }
}

// ── Concurrency Settings ──────────────────────────────────────────────

async function openConcurrencySettings() {
  const modal = document.getElementById('concurrencyModal');
  modal.classList.add('active');
  await loadConcurrencyConfig();
}

function closeConcurrencyModal() {
  document.getElementById('concurrencyModal').classList.remove('active');
}

async function loadConcurrencyConfig() {
  try {
    const res = await authFetch(`${API}/api/concurrency/config`);
    if (!res) return;
    const data = await res.json();
    document.getElementById('maxConcurrent').value = data.max_concurrent_downloads;
    document.getElementById('cd2TempDir').value = data.cd2_temp_dir;
    document.getElementById('checkInterval').value = data.check_interval;
  } catch (e) {
    console.error('Failed to load concurrency config:', e);
  }
}

async function saveConcurrencyConfig() {
  const config = {
    max_concurrent_downloads: parseInt(document.getElementById('maxConcurrent').value),
    cd2_temp_dir: document.getElementById('cd2TempDir').value,
    check_interval: parseInt(document.getElementById('checkInterval').value),
  };
  try {
    const res = await authFetch(`${API}/api/concurrency/config`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(config),
    });
    if (!res) return;
    const data = await res.json();
    if (data.success) {
      showToast('并发设置已保存', 'success');
      closeConcurrencyModal();
      updateQueueStatus();
    }
  } catch (e) {
    showToast('保存失败: ' + e.message, 'error');
  }
}

async function updateQueueStatus() {
  try {
    const res = await authFetch(`${API}/api/queue/status`);
    if (!res) return;
    const data = await res.json();
    const el = document.getElementById('queueStatus');
    if (data.cd2_temp_files > 0) {
      el.innerHTML = `队列: ${data.pending} | CD2上传: <span class="cd2-temp">${data.cd2_temp_files}</span> | 最大并发: ${data.max_concurrent}`;
    } else {
      el.innerHTML = `队列: ${data.pending} | 最大并发: ${data.max_concurrent}`;
    }
  } catch (e) {
    // silent
  }
}
// Auto-refresh queue status
setInterval(updateQueueStatus, 10000);
updateQueueStatus();

// Playlist detail modal
async function openPlaylistModal(playlistId) {
  var modal = document.getElementById('playlistModal');
  modal.classList.add('active');
  document.getElementById('playlistModalTitle').textContent = '加载中...';
  document.getElementById('playlistModalMeta').textContent = '';
  document.getElementById('playlistModalProgress').innerHTML = '';
  document.getElementById('playlistModalChildren').innerHTML = '<div class="empty-state"><p>加载子任务中...</p></div>';

  try {
    var res = await authFetch(API + '/api/playlists/' + playlistId + '/details');
    if (!res) { modal.classList.remove('active'); return; }
    var data = await res.json();
    var pl = data.playlist;
    var children = data.children;
    var total = data.total;
    var completed = children.filter(function(c) { return c.status === 'done' || c.status === 'moved'; }).length;
    var pct = total > 0 ? Math.round(completed / total * 100) : 0;

    document.getElementById('playlistModalTitle').textContent = pl.title || '播放列表';
    document.getElementById('playlistModalMeta').innerHTML = '<a href="' + escapeHtml(pl.url) + '" target="_blank" style="color: var(--primary); text-decoration: none;">' + escapeHtml(pl.url) + '</a>';
    document.getElementById('playlistModalProgress').innerHTML = [
      '<div style="display: flex; align-items: center; gap: 12px;">',
      '  <div style="flex: 1; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden;">',
      '    <div style="width: ' + pct + '%; height: 100%; background: var(--primary); border-radius: 4px;"></div>',
      '  </div>',
      '  <span style="font-size: 0.9rem; font-weight: 600;">' + completed + '/' + total + ' (' + pct + '%)</span>',
      '</div>'
    ].join('');

    var statusLabels = {queued: '⏳ 排队中', downloading: '📥 下载中', done: '✅ 已完成', error: '❌ 失败', moving: '🔄 移动中', moved: '📦 已转存', paused: '⏸ 已暂停'};
    var childHtml = children.map(function(c) {
      var thumb = c.thumbnail || '';
      var size = c.filesize ? formatBytes(c.filesize) : '';
      var duration = c.duration ? formatDuration(c.duration) : '';
      return '<div style="display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--glass-border); gap: 14px;">' +
        (thumb ? '<img src="' + escapeHtml(thumb) + '" style="width: 160px; height: 90px; object-fit: cover; border-radius: 8px; flex-shrink: 0; background: rgba(255,255,255,0.05);" onerror="this.style.display=\'none\'">' : '') +
        '<div style="flex: 1; min-width: 0;">' +
        '  <div style="display: flex; align-items: center; gap: 8px;">' +
        '    <span class="status-badge ' + c.status + '" style="flex-shrink: 0;">' + (statusLabels[c.status] || c.status) + '</span>' +
        '    <span style="flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.95rem;">' + escapeHtml(c.title || 'Unknown') + '</span>' +
        '  </div>' +
        '  <div style="display: flex; gap: 12px; margin-top: 8px; font-size: 0.85rem; color: var(--text-dim);">' +
        (size ? '<span>💾 ' + size + '</span>' : '') +
        (duration ? '<span>⏱ ' + duration + '</span>' : '') +
        (c.speed ? '<span>⚡ ' + c.speed + '</span>' : '') +
        '  </div>' +
        '</div>' +
        '</div>';
    }).join('');
    document.getElementById('playlistModalChildren').innerHTML = childHtml || '<div class="empty-state"><p>暂无子任务</p></div>';
  } catch (e) {
    document.getElementById('playlistModalTitle').textContent = '加载失败';
    document.getElementById('playlistModalChildren').innerHTML = '<div class="empty-state"><p>' + e.message + '</p></div>';
  }
}

function closePlaylistModal() {
  document.getElementById('playlistModal').classList.remove('active');
}

// Playlist search
function onPlaylistFilterChange() {
  clearTimeout(filterTimeout);
  var clearBtn = document.getElementById('playlistSearchClear');
  var input = document.getElementById('playlistSearchInput');
  if (clearBtn && input) clearBtn.style.display = input.value.trim() ? 'inline' : 'none';
  filterTimeout = setTimeout(function() {
    filterPlaylistQ = input.value.trim();
    loadPlaylists();
  }, 300);
}

function clearPlaylistSearch() {
  var input = document.getElementById('playlistSearchInput');
  if (input) input.value = '';
  filterPlaylistQ = '';
  var clearBtn = document.getElementById('playlistSearchClear');
  if (clearBtn) clearBtn.style.display = 'none';
  loadPlaylists();
}

// ── Subscription Tab Enhancements ──────────────────────────────────────

function onSubFilterChange() {
  clearTimeout(filterTimeout);
  filterTimeout = setTimeout(function() {
    filterSubQ = document.getElementById('subSearchInput').value.trim();
    loadSubscriptions();
  }, 300);
}

function toggleSelectAllSubs() {
  var allCards = document.querySelectorAll('.sub-card');
  var allIds = [];
  allCards.forEach(function(el) {
    var id = el.getAttribute('data-sub-id');
    if (id) allIds.push(id);
  });
  var allSelected = allIds.every(function(id) { return SELECTED_SUBS.has(id); });
  if (allSelected) {
    allIds.forEach(function(id) { SELECTED_SUBS.delete(id); });
  } else {
    allIds.forEach(function(id) { SELECTED_SUBS.add(id); });
  }
  // Re-render
  loadSubscriptions();
}

function toggleSubSelect(id) {
  if (SELECTED_SUBS.has(id)) {
    SELECTED_SUBS.delete(id);
  } else {
    SELECTED_SUBS.add(id);
  }
  updateSubBatchBar();
  // Re-render
  loadSubscriptions();
}

function updateSubBatchBar() {
  var count = SELECTED_SUBS.size;
  var selectAllBtn = document.getElementById('selectAllSubBtn');
  if (count === 0) {
    if (selectAllBtn) selectAllBtn.style.display = 'none';
  } else {
    if (selectAllBtn) selectAllBtn.style.display = 'inline-block';
  }
}

async function batchDeleteSubscriptions(ids) {
  try {
    var res = await authFetch(API + '/api/subscriptions/batch-delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ task_ids: ids }),
    });
    var data = await res.json();
    SELECTED_SUBS.clear();
    updateSubBatchBar();
    showToast('删除完成：成功 ' + data.success + '，失败 ' + data.failed, data.failed > 0 ? 'error' : 'success');
    loadSubscriptions();
  } catch (e) {
    showToast('批量删除失败: ' + e.message, 'error');
  }
}

</script>
